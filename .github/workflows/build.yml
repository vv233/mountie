name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Compile + test on every platform we have code paths for. Producing (and
# signing) installers is the release workflow's job — doing it here would need
# the signing secret, which pull requests from forks can't have.
jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libxdo-dev libssl-dev build-essential

      - name: Install frontend deps
        run: npm ci

      # tauri-build validates the sidecar at compile time, so fetch it first.
      - name: Fetch rclone sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/fetch-rclone.ps1

      - name: Fetch rclone sidecar (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/fetch-rclone.sh

      - name: Frontend tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Compile check
        run: cargo build --manifest-path src-tauri/Cargo.toml
